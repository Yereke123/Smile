<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SMILE CENTER</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <main class="main-wrapper">
   <div class="glass-card">
  
  <div class="avatar-wrapper">
    <img src="Aizat.png" id="userAvatar" alt="Фото" onerror="this.src='zhalgas.png'">
  </div>

  <div class="brand-text">
    <h2 id="personName">Мухамметжанов Айзат Аманжолович</h2>
    <h1 id="userName">SMILE CENTER</h1> 
    <p id="userJob">стоматолог</p>
  </div>

  <div class="button-group">
    <a id="btnWhatsapp" href="#" class="pill-btn" target="_blank">
        <i class="fab fa-whatsapp"></i> WhatsApp
    </a>
    <a id="btnInstagram" href="#" class="pill-btn" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
    </a>
    <a id="btnSave" href="#" class="pill-btn">
        <i class="fas fa-user-plus"></i> Сохранить контакт
    </a>
  </div>

  <div class="card-social">
    <a href="https://www.instagram.com/smilecenter_atyrau?igsh=eDh6ZDlpZjJqMDRp" target="_blank" class="social-item">
      <i class="fab fa-instagram"></i>
      <span>Instagram</span>
      <span class="city-label">Atyrau Clinic</span>
    </a>
    <a href="https://www.instagram.com/smilecenter_astana?igsh=MTl4ajBvcnM1YWhwbg%3D%3D" target="_blank" class="social-item">
      <i class="fab fa-instagram"></i>
      <span>Instagram</span>
      <span class="city-label">Astana Clinic</span>
    </a>
    <a href="https://go.2gis.com/ZBp6J" target="_blank" class="social-item">
      <i class="fas fa-map-marker-alt"></i>
      <span>2GIS</span>
    </a>
  </div>

</div>
  </main>

  <script src="script.js"></script>
</body>
</html>
